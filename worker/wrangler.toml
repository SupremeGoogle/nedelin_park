name = "nedelin-park-tg"
main = "src/index.js"
compatibility_date = "2025-10-01"
workers_dev = true

# Привязка KV-хранилища для chat_id админов.
# После создания через `wrangler kv namespace create ADMINS`
# подставьте сюда полученный id.
[[kv_namespaces]]
binding = "ADMINS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Секреты задаются командой `wrangler secret put <NAME>`:
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_WEBHOOK_TOKEN
#   NOTIFY_SECRET
